version: '3.8'

services:
  xerocare-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xerocare-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # RabbitMQ and Redis use their compose service hostnames
      RABBITMQ_URL: amqp://rabbitmq:5672
      REDIS_URL: redis://redis:6379
    ports:
      - '3000' # Frontend (Next.js)
      - '3001' # API Gateway
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - xerocare-network

  redis:
    image: redis:7-alpine
    container_name: xerocare-redis
    restart: unless-stopped
    ports:
      - '6379'
    volumes:
      - redis_data:/data
    networks:
      - xerocare-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: xerocare-rabbitmq
    restart: unless-stopped
    ports:
      - '5672' # AMQP protocol port
      - '15672' # HTTP Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq/mnesia
    networks:
      - xerocare-network
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: xerocare-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: xerocare
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - xerocare-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d xerocare']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongodb:
    image: mongo:7
    container_name: xerocare-mongodb
    restart: unless-stopped
    ports:
      - '27017'
    volumes:
      - mongodb_data:/data/db
    networks:
      - xerocare-network
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

networks:
  xerocare-network:
    driver: bridge

volumes:
  redis_data:
  rabbitmq_data:
  postgres_data:
  mongodb_data:
